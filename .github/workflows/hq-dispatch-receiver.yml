name: HQ Dispatch Receiver

on:
  repository_dispatch:
    types:
      - cell-report
      - deploy-result
      - health-report
      - cost-report

permissions:
  contents: write

concurrency:
  # 셀별 group → 6 dispatch 동시 들어와도 모두 실행. push 충돌은 rebase 5회로 해결
  group: hq-receiver-${{ github.event.client_payload.cell || github.run_id }}
  cancel-in-progress: false

jobs:
  receive:
    runs-on: ubuntu-latest
    env:
      EVENT_TYPE: ${{ github.event.action }}
      PAYLOAD_JSON: ${{ toJson(github.event.client_payload) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Append + commit + push (atomic retry)
        run: |
          set -e
          git config user.name  "HQ Receiver Bot"
          git config user.email "hq-receiver@dtslib.com"

          CELL=$(printf '%s' "$PAYLOAD_JSON" | jq -r '.cell // .branch // "unknown"')
          case "$EVENT_TYPE" in
            "cell-report")    LEDGER_TYPE="sync_upstream" ;;
            "deploy-result")  LEDGER_TYPE="deploy_succeeded" ;;
            "health-report")  LEDGER_TYPE="health_check" ;;
            "cost-report")    LEDGER_TYPE="cost_recorded" ;;
            *)                LEDGER_TYPE="$EVENT_TYPE" ;;
          esac

          TS="$(date -u -Iseconds)"
          TXN_ID="TXN-$(date -u +%Y%m%d-%H%M%S)-$RANDOM-$$"
          ENTRY=$(jq -nc \
            --arg id "$TXN_ID" \
            --arg ts "$TS" \
            --arg type "$LEDGER_TYPE" \
            --arg cell "$CELL" \
            --argjson data "$PAYLOAD_JSON" \
            '{id:$id,timestamp:$ts,eventType:$type,actor:"worker",cell:$cell,data:$data,status:"success"}')

          # 동시 6 dispatch 안전 처리: fetch → reset → append → commit → push 루프
          for attempt in 1 2 3 4 5 6 7 8; do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p hq/ledger
            echo "$ENTRY" >> hq/ledger/ledger.jsonl
            git add hq/ledger/ledger.jsonl
            git commit -m "ledger: ${EVENT_TYPE} from ${CELL} (${TXN_ID})" >/dev/null
            if git push origin main 2>/dev/null; then
              echo "✅ pushed attempt=$attempt cell=$CELL txn=$TXN_ID"
              exit 0
            fi
            BACKOFF=$((attempt * 2 + RANDOM % 3))
            echo "⚠️ push 충돌 attempt=$attempt — ${BACKOFF}s 후 재시도"
            sleep $BACKOFF
          done
          echo "❌ 8회 재시도 실패"
          exit 1
