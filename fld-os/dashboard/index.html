<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FLD OS — 대시보드</title>
<style>
:root { --bg: #0a0e0a; --card: #111811; --gold: #d4af37; --accent: #2d8b57; --text: #d4dcd4; --dim: #6a7a6a; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
h1 { font-size: 1.4rem; color: var(--gold); margin-bottom: 4px; }
.sub { color: var(--dim); font-size: 0.8rem; margin-bottom: 20px; }
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 12px; margin-bottom: 20px; }
.card { background: var(--card); border: 1px solid #1a2a1a; border-radius: 8px; padding: 16px; }
.card h3 { font-size: 0.75rem; color: var(--dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.card .num { font-size: 2rem; font-weight: 700; color: var(--gold); }
.card .num.accent { color: var(--accent); }
.card .num.dim { color: var(--dim); }
.state-bar { display: flex; gap: 4px; margin-top: 8px; }
.state-seg { height: 8px; border-radius: 4px; flex: 1; background: #1a2a1a; transition: all 0.3s; }
.state-seg.active { background: var(--gold); }
.state-seg.done { background: var(--accent); }
table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
th { text-align: left; color: var(--dim); padding: 8px 4px; border-bottom: 1px solid #1a2a1a; font-weight: 400; }
td { padding: 8px 4px; border-bottom: 1px solid #0f1a0f; }
.badge { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; display: inline-block; }
.badge-seed { background: #2a3a2a; color: #8a9a8a; }
.badge-scenario { background: #2a3a4a; color: #8ab4d4; }
.badge-candidate { background: #3a3a1a; color: #d4c48a; }
.badge-pilot { background: #1a3a2a; color: #8ad4a4; }
.badge-protocol { background: #2a3a2a; color: var(--gold); }
.badge-dropped { background: #3a1a1a; color: #d48a8a; }
.toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar button { background: var(--card); color: var(--text); border: 1px solid #2a3a2a; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
.toolbar button:hover { border-color: var(--gold); }
.log { margin-top: 20px; }
.log pre { font-size: 0.75rem; color: var(--dim); max-height: 200px; overflow-y: auto; padding: 12px; background: #050805; border-radius: 6px; }
.refresh { color: var(--gold); cursor: pointer; font-size: 0.8rem; }
</style>
</head>
<body>
<h1>FLD OS</h1>
<p class="sub">Fiction Ledger Design — 운영체계 대시보드 <span class="refresh" onclick="load()">⟳</span></p>

<div class="toolbar">
  <button onclick="filter('')">전체</button>
  <button onclick="filter('seed')">🌱 Seed</button>
  <button onclick="filter('scenario')">📋 Scenario</button>
  <button onclick="filter('candidate')">🔍 Candidate</button>
  <button onclick="filter('pilot')">🧪 Pilot</button>
  <button onclick="filter('protocol')">📦 Protocol</button>
  <button onclick="filter('dropped')">🗑️ 폐기</button>
  <button onclick="showAddForm()">+ 새 Seed</button>
</div>

<div class="grid" id="stats"></div>
<div id="items"></div>
<div id="add-form" style="display:none; margin-bottom:16px;">
  <div class="card" style="max-width:500px">
    <h3>새 Seed 추가</h3>
    <input id="seed-title" placeholder="제목" style="width:100%;background:#0a0e0a;border:1px solid #2a3a2a;color:#d4dcd4;padding:6px;border-radius:4px;margin:4px 0">
    <input id="seed-source" placeholder="원본 위치 (파일/URL)" style="width:100%;background:#0a0e0a;border:1px solid #2a3a2a;color:#d4dcd4;padding:6px;border-radius:4px;margin:4px 0">
    <textarea id="seed-raw" placeholder="원본 텍스트" rows="3" style="width:100%;background:#0a0e0a;border:1px solid #2a3a2a;color:#d4dcd4;padding:6px;border-radius:4px;margin:4px 0"></textarea>
    <button onclick="addSeed()" style="background:var(--gold);color:#0a0e0a;border:none;padding:6px 16px;border-radius:4px;margin-top:4px;cursor:pointer">추가</button>
    <button onclick="document.getElementById('add-form').style.display='none'" style="background:#2a3a2a;color:#d4dcd4;border:none;padding:6px 16px;border-radius:4px;margin-top:4px;cursor:pointer">취소</button>
  </div>
</div>

<div class="log">
  <h3 style="font-size:0.75rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">장부 로그</h3>
  <pre id="ledger-log">로딩 중...</pre>
</div>

<script>
const API = 'http://localhost:8090';
let currentFilter = '';

function api(path) { return fetch(API+path).then(r=>r.json()); }
function apiPost(tool, params) {
  return fetch(API, {method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({tool,params})}).then(r=>r.json());
}

async function load() {
  const stats = await fetch('/api/stats').then(r=>r.json()).catch(()=>null);
  if (stats) {
    let h = '';
    const items = [
      {label:'전체', n:stats.total||0, cls:''},
      {label:'🌱 Seed', n:stats.by_state?.seed||0, cls:'dim'},
      {label:'📋 Scenario', n:stats.by_state?.scenario||0, cls:''},
      {label:'🔍 Candidate', n:stats.by_state?.candidate||0, cls:''},
      {label:'🧪 Pilot', n:stats.by_state?.pilot||0, cls:'accent'},
      {label:'📦 Protocol', n:stats.by_state?.protocol||0, cls:'accent'},
    ];
    for (const item of items) {
      h += `<div class="card"><h3>${item.label}</h3><div class="num ${item.cls}">${item.n}</div></div>`;
    }
    document.getElementById('stats').innerHTML = h;
  }

  const list = await apiPost('fld_list', {state: currentFilter});
  if (list.items) {
    const state_labels = {seed:'🌱 Seed',scenario:'📋 Scenario',candidate:'🔍 Candidate',pilot:'🧪 Pilot',protocol:'📦 Protocol'};
    const rows = list.items.map(i => {
      const sl = state_labels[i.state]||i.state;
      return `<tr>
        <td><span class="badge badge-${i.state}">${sl}</span></td>
        <td>${i.title}</td>
        <td style="color:var(--dim)">${i.account}</td>
        <td style="color:var(--gold)">${i.score||'-'}</td>
        <td style="color:var(--dim);font-size:0.75rem">${i.created}</td>
      </tr>`;
    }).join('');
    document.getElementById('items').innerHTML =
      `<div class="card"><table><tr><th>상태</th><th>제목</th><th>계정</th><th>점수</th><th>생성일</th></tr>${rows}</table></div>`;
  }

  // ledger log
  document.getElementById('ledger-log').textContent = JSON.stringify(list, null, 2);
}

function filter(s) { currentFilter = s; load(); }
function showAddForm() { document.getElementById('add-form').style.display = 'block'; }

async function addSeed() {
  const title = document.getElementById('seed-title').value;
  const raw_source = document.getElementById('seed-source').value;
  const raw_text = document.getElementById('seed-raw').value;
  if (!title) return alert('제목 필요');
  const r = await apiPost('fld_ingest', {log_text: raw_text || title, source_path: raw_source});
  if (r.status === 'ok') {
    alert('Seed 생성 완료: ' + r.item.id);
    document.getElementById('add-form').style.display = 'none';
    load();
  } else {
    alert('오류: ' + (r.error||'unknown'));
  }
}

// Stats API proxy
async function loadStats() {
  try {
    const stats = await apiPost('fld_stats', {});
    console.log('Stats:', stats);
  } catch(e) {}
}

load();
setInterval(load, 15000);  // 15초마다 갱신
</script>
</body>
</html>
