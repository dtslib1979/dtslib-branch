<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>비즈니스 소설 | DTSLIB</title>
<meta name="description" content="비즈니스를 이야기로 엮는 소설 연재">
<style>
  :root {
    --bg: #040806;
    --bg-elevated: #0a110d;
    --bg-card: #0e1812;
    --accent: #2D8B57;
    --gold: #D4AF37;
    --gold-dim: rgba(212,175,55,.06);
    --text: #FAFAF8;
    --text-secondary: rgba(250,250,248,.7);
    --text-muted: rgba(250,250,248,.45);
    --border: rgba(250,250,248,.06);
    --border-gold: rgba(212,175,55,.2);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', 'Cormorant Garamond', Georgia, serif;
    line-height: 1.8;
    min-height: 100vh;
  }
  .container { max-width: 720px; margin: 0 auto; padding: 2rem 1.5rem; }
  .header { text-align: center; padding: 3rem 0 2rem; border-bottom: 1px solid var(--border-gold); margin-bottom: 3rem; }
  .header h1 { font-size: 2rem; color: var(--gold); font-weight: 700; letter-spacing: -0.02em; }
  .header p { color: var(--text-muted); font-size: 0.95rem; margin-top: 0.5rem; font-style: italic; }
  .back { display: inline-block; margin-bottom: 2rem; color: var(--text-muted); text-decoration: none; font-family: sans-serif; font-size: 0.85rem; }
  .back:hover { color: var(--gold); }
  .chapter { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; transition: border-color 0.2s; }
  .chapter:hover { border-color: var(--border-gold); }
  .chapter-meta { font-size: 0.75rem; color: var(--text-muted); font-family: sans-serif; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
  .chapter h2 { font-size: 1.3rem; color: var(--gold); margin-bottom: 0.3rem; }
  .chapter p { color: var(--text-secondary); font-size: 0.95rem; }
  .chapter a { color: var(--text); text-decoration: none; display: block; }
  .chapter a:hover h2 { color: var(--accent); }
  .empty { text-align: center; padding: 4rem 0; color: var(--text-muted); }
  .empty p { font-size: 1.1rem; margin-bottom: 0.5rem; }
  .empty small { font-size: 0.85rem; opacity: 0.6; }
</style>
</head>
<body>
<div class="container">
  <a href="../" class="back">← DTSLIB</a>
  <div class="header">
    <h1>비즈니스 소설</h1>
    <p>업종을 세계관으로, 비즈니스를 이야기로 엮는다</p>
  </div>
  <div class="empty">
    <p>📖 첫 번째 에피소드를 준비 중입니다</p>
    <small>비즈니스는 가장 현실적인 장르 소설이다</small>
  </div>
</div>
</body>
</html>
